name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run tests
        run: go run github.com/onsi/ginkgo/v2/ginkgo -r

      - name: Build release archives
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for pair in "darwin arm64" "darwin amd64" "linux arm64" "linux amd64" "windows amd64"; do
            set -- $pair
            os=$1
            arch=$2
            out="dot-agent_${VERSION}_${os}_${arch}"
            if [ "$os" = "windows" ]; then
              GOOS=$os GOARCH=$arch go build -ldflags "-s -w" -o "${out}.exe" ./cmd/dot-agent
              zip "${out}.zip" "${out}.exe"
            else
              GOOS=$os GOARCH=$arch go build -ldflags "-s -w" -o "$out" ./cmd/dot-agent
              tar -czf "${out}.tar.gz" "$out"
            fi
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dot-agent_*_darwin_*.tar.gz
            dot-agent_*_linux_*.tar.gz
            dot-agent_*_windows_*.zip
