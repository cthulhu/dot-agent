name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run tests
        run: go run github.com/onsi/ginkgo/v2/ginkgo -r

      - name: Build release archives
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for pair in "darwin arm64" "darwin amd64" "linux arm64" "linux amd64" "windows amd64"; do
            set -- $pair
            os=$1
            arch=$2
            out="dot-agent_${VERSION}_${os}_${arch}"
            if [ "$os" = "windows" ]; then
              GOOS=$os GOARCH=$arch go build -ldflags "-s -w" -o "${out}.exe" ./cmd/dot-agent
              zip "${out}.zip" "${out}.exe"
            else
              GOOS=$os GOARCH=$arch go build -ldflags "-s -w" -o "$out" ./cmd/dot-agent
              tar -czf "${out}.tar.gz" "$out"
            fi
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dot-agent_*_darwin_*.tar.gz
            dot-agent_*_linux_*.tar.gz
            dot-agent_*_windows_*.zip

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Pack and Publish Chocolatey Package to GitHub Packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          nuget pack chocolatey/dot-agent.nuspec -Version "$VERSION" -OutputDirectory .
          dotnet nuget push "*.nupkg" --api-key "${{ secrets.GITHUB_TOKEN }}" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
